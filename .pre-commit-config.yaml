repos:
  - repo: local
    hooks:
      - id: ruff
        name: Ruff Linter
        entry: poetry run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      
      - id: mypy
        name: Mypy Type Checker
        entry: poetry run mypy
        language: system
        types: [python]
        require_serial: true