name: Project Raidline CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-cpp:
    name: Windows C++ build and test
    runs-on: windows-2022

    env:
      BUILD_TYPE: Debug
      VCPKG_FEATURE_FLAGS: manifests,binarycaching

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git -C "$env:VCPKG_INSTALLATION_ROOT" fetch origin master
          git -C "$env:VCPKG_INSTALLATION_ROOT" reset --hard origin/master

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build C++ targets
        shell: pwsh
        run: cmake --build build --config $env:BUILD_TYPE

      - name: Run C++ tests
        shell: pwsh
        run: ctest --test-dir build -C $env:BUILD_TYPE --output-on-failure

  ubuntu-cpp:
    name: Ubuntu C++ build and test
    runs-on: ubuntu-22.04

    env:
      BUILD_TYPE: Debug
      VCPKG_FEATURE_FLAGS: manifests,binarycaching

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SDL3 system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            pkg-config \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxrender-dev \
            libxfixes-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxxf86vm-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libibus-1.0-dev \
            libdbus-1-dev \
            libudev-dev \
            libasound2-dev \
            libpulse-dev \
            libpipewire-0.3-dev \
            libdecor-0-dev

      - name: Setup vcpkg
        shell: bash
        run: |
          git -C "$VCPKG_INSTALLATION_ROOT" fetch origin master
          git -C "$VCPKG_INSTALLATION_ROOT" reset --hard origin/master

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build C++ targets
        shell: bash
        run: cmake --build build

      - name: Run C++ tests
        shell: bash
        run: ctest --test-dir build --output-on-failure