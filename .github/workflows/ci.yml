name: Project Raidline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build tools and SDL dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            make \
            g++ \
            pkg-config \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            libltdl-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxrender-dev \
            libxfixes-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxxf86vm-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libibus-1.0-dev \
            libdbus-1-dev \
            libudev-dev \
            libasound2-dev \
            libpulse-dev \
            libpipewire-0.3-dev \
            libdecor-0-dev
          which make
          which g++
          make --version
          g++ --version

      - name: Update Vcpkg (Sync Baseline)
        shell: bash
        run: |
          cd "$VCPKG_INSTALLATION_ROOT"
          git fetch
          git reset --hard origin/master

      - name: Configure CMake on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake -B build -S . \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=/usr/bin/g++ \
            -DCMAKE_MAKE_PROGRAM=/usr/bin/make \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Configure CMake on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Print Linux vcpkg logs on failure
        if: failure() && runner.os == 'Linux'
        shell: bash
        run: |
          echo "===== vcpkg manifest install log ====="
          cat build/vcpkg-manifest-install.log || true

          echo "===== vcpkg buildtrees logs ====="
          find "$VCPKG_INSTALLATION_ROOT/buildtrees" build \
            -type f \( -name "*.log" -o -name "*-out.log" -o -name "*-err.log" \) \
            -print \
            -exec tail -n 120 {} \; || true

      - name: Build C++ Code
        run: cmake --build build

      - name: Run C++ Tests
        run: ctest --test-dir build -C Debug --output-on-failure

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.1"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Check code format (Ruff)
        run: poetry run ruff check .

      - name: Check static types (Mypy)
        run: poetry run mypy .

      - name: Run Python Tests (Pytest)
        run: poetry run pytest