name: Project Raidline CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  BUILD_TYPE: Debug
  VCPKG_FEATURE_FLAGS: manifests,binarycaching

jobs:
  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux SDL3/vcpkg system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config autoconf autoconf-archive automake libtool \
            libx11-dev libxext-dev libxrandr-dev libxrender-dev libxfixes-dev \
            libxi-dev libxcursor-dev libxinerama-dev libxxf86vm-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev \
            libibus-1.0-dev libdbus-1-dev libudev-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev libdecor-0-dev

      - name: Update vcpkg registry
        shell: bash
        run: |
          git -C "$VCPKG_INSTALLATION_ROOT" fetch origin master
          git -C "$VCPKG_INSTALLATION_ROOT" reset --hard origin/master

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build C++ targets
        shell: bash
        run: cmake --build build --config "$BUILD_TYPE"

      - name: Run C++ tests
        shell: bash
        run: ctest --test-dir build -C "$BUILD_TYPE" --output-on-failure

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install Python dependencies
        shell: bash
        run: poetry install --no-interaction --no-root

      - name: Check Python lint
        shell: bash
        run: poetry run ruff check .

      - name: Check Python types
        shell: bash
        run: poetry run mypy .

      - name: Run Python tests
        shell: bash
        run: poetry run pytest