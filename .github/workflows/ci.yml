name: Project Raidline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build tools and SDL dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            make \
            g++ \
            pkg-config \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            libltdl-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxrender-dev \
            libxfixes-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxxf86vm-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libibus-1.0-dev \
            libdbus-1-dev \
            libudev-dev \
            libasound2-dev \
            libpulse-dev \
            libpipewire-0.3-dev \
            libdecor-0-dev
          which make
          which g++
          make --version
          g++ --version

      - name: Update Vcpkg (Sync Baseline)
        shell: bash
        run: |
          cd "$VCPKG_INSTALLATION_ROOT"
          git fetch
          git reset --hard origin/master

      - name: Configure CMake on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake -B build -S . \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=/usr/bin/g++ \
            -DCMAKE_MAKE_PROGRAM=/usr/bin/make \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Configure CMake on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Print compact Linux vcpkg failure summary
        if: failure() && runner.os == 'Linux'
        shell: bash
        run: |
          echo "===== vcpkg manifest install log: key lines ====="
          if [ -f build/vcpkg-manifest-install.log ]; then
            grep -nE "error:|failed|FAILED|CMake Error|depends on|sudo apt|BUILD_FAILED" \
              build/vcpkg-manifest-install.log | head -n 120 || true
          else
            echo "build/vcpkg-manifest-install.log not found"
          fi

          echo "===== recent vcpkg log files ====="
          find "$VCPKG_INSTALLATION_ROOT/buildtrees" build \
            -type f \( -name "*.log" -o -name "*-out.log" -o -name "*-err.log" \) \
            -printf "%T@ %p\n" 2>/dev/null | sort -nr | head -n 20 || true

      - name: Upload Linux vcpkg logs
        if: failure() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-vcpkg-logs
          path: |
            build/vcpkg-manifest-install.log
            build/vcpkg_installed/vcpkg/issue_body.md
            ${{ env.VCPKG_INSTALLATION_ROOT }}/buildtrees/**/*.log
            ${{ env.VCPKG_INSTALLATION_ROOT }}/buildtrees/**/*-out.log
            ${{ env.VCPKG_INSTALLATION_ROOT }}/buildtrees/**/*-err.log
          if-no-files-found: ignore

      - name: Build C++ Code
        run: cmake --build build

      - name: Run C++ Tests
        run: ctest --test-dir build -C Debug --output-on-failure

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.1"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Check code format (Ruff)
        run: poetry run ruff check .

      - name: Check static types (Mypy)
        run: poetry run mypy .

      - name: Run Python Tests (Pytest)
        run: poetry run pytest