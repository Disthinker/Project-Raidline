name: Project Raidline CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-cpp:
    name: Windows C++ build and test
    runs-on: windows-latest

    env:
      BUILD_TYPE: Debug
      VCPKG_DISABLE_METRICS: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          git clone https://github.com/microsoft/vcpkg.git "$vcpkgRoot"
          & "$vcpkgRoot\bootstrap-vcpkg.bat"

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build C++ targets
        shell: pwsh
        run: cmake --build build --config $env:BUILD_TYPE

      - name: Run C++ tests
        shell: pwsh
        run: ctest --test-dir build -C $env:BUILD_TYPE --output-on-failure